version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    # Require a maintainer to review before any SHA-pinned action update merges.
    # This prevents auto-merge of dependabot PRs that modify .github/ without
    # human inspection, as required by branch protection rules.
    reviewers:
      - HomericIntelligence/maintainers
    # Group setup-uv updates so the action SHA bump is reviewed as a unit.
    # ADR-018: uv replaces pixi; the build toolchain is uv-managed and the
    # workflows use astral-sh/setup-uv (formerly prefix-dev/setup-pixi).
    # See HomericIntelligence/Charybdis#122.
    groups:
      setup-uv:
        patterns:
          - "astral-sh/setup-uv"
