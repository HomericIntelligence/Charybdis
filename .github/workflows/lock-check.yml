name: Lock Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  uv-lock-check:
    name: uv/lock-check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Setup uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7.6.0
        with:
          enable-cache: true
      # ADR-018: uv replaces pixi. `uv lock --check` fails if uv.lock would
      # change, i.e. it was not regenerated after a pyproject.toml edit.
      - name: Verify uv.lock is up-to-date
        run: uv lock --check
