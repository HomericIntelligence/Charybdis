name: Lock Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  uv-lock-check:
    name: uv/lock-check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
      - name: Setup uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          enable-cache: true
      # ADR-018: uv replaces pixi. `uv lock --check` fails if uv.lock would
      # change, i.e. it was not regenerated after a pyproject.toml edit.
      - name: Verify uv.lock is up-to-date
        run: uv lock --check
