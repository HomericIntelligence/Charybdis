name: Static Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  clang-format:
    name: clang-format
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
      - name: Install clang-format
        run: sudo apt-get install -y clang-format
      - name: Check formatting
        run: ./scripts/format.sh --check

  clang-tidy:
    name: clang-tidy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build clang clang-tidy python3-pip
          pip3 install --user conan
      - name: Install Conan dependencies
        uses: ./.github/actions/conan-install
        with:
          build_type: debug
          compiler: clang
      - name: Configure
        run: CC=clang CXX=clang++ cmake --preset debug -DCharybdis_ENABLE_CLANG_TIDY=ON
      - name: Build
        run: cmake --build --preset debug

  action-pins:
    name: action-pins
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
      - name: "Verify all uses: references are SHA-pinned"
        run: ./scripts/check-action-pins.sh

  markdown-lint:
    name: markdown-lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
      - name: Install markdownlint-cli
        run: npm install --global markdownlint-cli@0.41.0
      - name: Lint Markdown documentation
        run: markdownlint --config .markdownlint.yaml '**/*.md' --ignore node_modules --ignore build

  lint:
    name: lint
    runs-on: ubuntu-24.04
    needs: [clang-format, clang-tidy, action-pins, markdown-lint]
    if: always()
    steps:
      - name: Check static analysis results
        env:
          R_FMT: ${{ needs.clang-format.result }}
          R_TIDY: ${{ needs.clang-tidy.result }}
          R_PINS: ${{ needs.action-pins.result }}
          R_MD: ${{ needs.markdown-lint.result }}
        run: |
          if [ "${R_FMT}" != "success" ] || \
             [ "${R_TIDY}" != "success" ] || \
             [ "${R_PINS}" != "success" ] || \
             [ "${R_MD}" != "success" ]; then
            echo "Static analysis failed"
            exit 1
          fi
          echo "Static analysis passed"

  check-all:
    name: All Static Analysis Checks
    runs-on: ubuntu-24.04
    needs: [clang-format, clang-tidy, action-pins, markdown-lint]
    if: always()
    steps:
      - name: Check all jobs passed
        env:
          R_FMT: ${{ needs.clang-format.result }}
          R_TIDY: ${{ needs.clang-tidy.result }}
          R_PINS: ${{ needs.action-pins.result }}
          R_MD: ${{ needs.markdown-lint.result }}
        run: |
          if [ "$R_FMT" != "success" ] || \
             [ "$R_TIDY" != "success" ] || \
             [ "$R_PINS" != "success" ] || \
             [ "$R_MD" != "success" ]; then
            echo "Static analysis failed"; exit 1
          fi
          echo "All checks passed"
