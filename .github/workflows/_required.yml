name: Required Checks

on:
  workflow_run:
    workflows: ["Build and Test", "Static Analysis", "Code Coverage", "CodeQL SAST", "Sanitizers", "Lock Check", "Container Build and Publish", "Integration Tests"]
    types: [completed]
  pull_request:
    branches: [main]
  push:
    branches: [main]

# No concurrency cancellation for workflow_run events — they must always
# report a result so the branch ruleset check contexts are populated.
concurrency:
  group: required-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Fan-in jobs: reflect the result of upstream workflows
  # ---------------------------------------------------------------------------

  build:
    name: build
    runs-on: ubuntu-24.04
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow.name == 'Build and Test'
    steps:
      - name: Check Build and Test result
        if: github.event_name == 'workflow_run'
        env:
          CONCLUSION: ${{ github.event.workflow_run.conclusion }}
        run: |
          if [ "${CONCLUSION}" != "success" ]; then
            echo "Build and Test workflow failed with: ${CONCLUSION}"
            exit 1
          fi
          echo "Build and Test passed"
      - name: Skip (not triggered by this workflow)
        if: github.event_name != 'workflow_run'
        run: echo "Not a workflow_run event — pass (actual work done by Build and Test workflow)"

  unit-tests:
    name: unit-tests
    runs-on: ubuntu-24.04
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow.name == 'Build and Test'
    steps:
      - name: Check Build and Test result
        if: github.event_name == 'workflow_run'
        env:
          CONCLUSION: ${{ github.event.workflow_run.conclusion }}
        run: |
          if [ "${CONCLUSION}" != "success" ]; then
            echo "Build and Test workflow failed with: ${CONCLUSION}"
            exit 1
          fi
          echo "Build and Test passed"
      - name: Skip (not triggered by this workflow)
        if: github.event_name != 'workflow_run'
        run: echo "Not a workflow_run event — pass (actual work done by Build and Test workflow)"

  integration-tests:
    name: integration-tests
    runs-on: ubuntu-24.04
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow.name == 'Integration Tests'
    steps:
      - name: Check Integration Tests result
        if: github.event_name == 'workflow_run'
        env:
          CONCLUSION: ${{ github.event.workflow_run.conclusion }}
        run: |
          if [ "${CONCLUSION}" != "success" ]; then
            echo "Integration Tests workflow failed with: ${CONCLUSION}"
            exit 1
          fi
          echo "Integration Tests passed"
      - name: Skip (not triggered by this workflow)
        if: github.event_name != 'workflow_run'
        run: echo "Not a workflow_run event — pass (actual work done by Integration Tests workflow)"

  # Canonical aggregate `test` check for the Odysseus ecosystem board.
  # Charybdis keeps the split `unit-tests` / `integration-tests` sub-checks
  # above; this job surfaces a single `test` name that reflects either test
  # workflow. The real test work runs in "Build and Test" (unit) and
  # "Integration Tests" (integration); this fan-in mirrors their conclusion.
  test:
    name: test
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow.name == 'Build and Test' ||
      github.event.workflow.name == 'Integration Tests'
    steps:
      - name: Check upstream test workflow result
        if: github.event_name == 'workflow_run'
        env:
          WORKFLOW: ${{ github.event.workflow.name }}
          CONCLUSION: ${{ github.event.workflow_run.conclusion }}
        run: |
          if [ "${CONCLUSION}" != "success" ]; then
            echo "${WORKFLOW} workflow failed with: ${CONCLUSION}"
            exit 1
          fi
          echo "${WORKFLOW} passed"
      - name: Skip (not triggered by this workflow)
        if: github.event_name != 'workflow_run'
        run: echo "Not a workflow_run event — pass (actual work done by Build and Test / Integration Tests workflows)"

  lint:
    name: lint
    runs-on: ubuntu-24.04
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow.name == 'Static Analysis'
    steps:
      - name: Check Static Analysis result
        if: github.event_name == 'workflow_run'
        env:
          CONCLUSION: ${{ github.event.workflow_run.conclusion }}
        run: |
          if [ "${CONCLUSION}" != "success" ]; then
            echo "Static Analysis workflow failed with: ${CONCLUSION}"
            exit 1
          fi
          echo "Static Analysis passed"
      - name: Skip (not triggered by this workflow)
        if: github.event_name != 'workflow_run'
        run: echo "Not a workflow_run event — pass (actual work done by Static Analysis workflow)"

  security-codeql:
    name: security/codeql
    runs-on: ubuntu-24.04
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow.name == 'CodeQL SAST'
    steps:
      - name: Check CodeQL SAST result
        if: github.event_name == 'workflow_run'
        env:
          CONCLUSION: ${{ github.event.workflow_run.conclusion }}
        run: |
          if [ "${CONCLUSION}" != "success" ]; then
            echo "CodeQL SAST workflow failed with: ${CONCLUSION}"
            exit 1
          fi
          echo "CodeQL SAST passed"
      - name: Skip (not triggered by this workflow)
        if: github.event_name != 'workflow_run'
        run: echo "Not a workflow_run event — pass (actual work done by CodeQL SAST workflow)"

  sanitizers:
    name: sanitizers
    runs-on: ubuntu-24.04
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow.name == 'Sanitizers'
    steps:
      - name: Check Sanitizers result
        if: github.event_name == 'workflow_run'
        env:
          CONCLUSION: ${{ github.event.workflow_run.conclusion }}
        run: |
          if [ "${CONCLUSION}" != "success" ]; then
            echo "Sanitizers workflow failed with: ${CONCLUSION}"
            exit 1
          fi
          echo "Sanitizers passed"
      - name: Skip (not triggered by this workflow)
        if: github.event_name != 'workflow_run'
        run: echo "Not a workflow_run event — pass (actual work done by Sanitizers workflow)"

  pixi-lock-check:
    name: pixi-lock-check
    runs-on: ubuntu-24.04
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow.name == 'Lock Check'
    steps:
      - name: Check Lock Check result
        if: github.event_name == 'workflow_run'
        env:
          CONCLUSION: ${{ github.event.workflow_run.conclusion }}
        run: |
          if [ "${CONCLUSION}" != "success" ]; then
            echo "Lock Check workflow failed with: ${CONCLUSION}"
            exit 1
          fi
          echo "Lock Check passed"
      - name: Skip (not triggered by this workflow)
        if: github.event_name != 'workflow_run'
        run: echo "Not a workflow_run event — pass (actual work done by Lock Check workflow)"

  docker-build:
    name: docker-build
    runs-on: ubuntu-24.04
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow.name == 'Container Build and Publish'
    steps:
      - name: Check Container Build and Publish result
        if: github.event_name == 'workflow_run'
        env:
          CONCLUSION: ${{ github.event.workflow_run.conclusion }}
        run: |
          if [ "${CONCLUSION}" != "success" ]; then
            echo "Container Build and Publish workflow failed with: ${CONCLUSION}"
            exit 1
          fi
          echo "Container Build and Publish passed"
      - name: Skip (not triggered by this workflow)
        if: github.event_name != 'workflow_run'
        run: echo "Not a workflow_run event — pass (actual work done by Container Build and Publish workflow)"

  # Canonical `package` check for the Odysseus ecosystem board. Charybdis's
  # distributable is the container image built by "Container Build and Publish"
  # (also surfaced as the custom `docker-build` sub-check above). This fan-in
  # reflects that workflow's result under the canonical `package` name.
  package:
    name: package
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow.name == 'Container Build and Publish'
    steps:
      - name: Check Container Build and Publish result
        if: github.event_name == 'workflow_run'
        env:
          CONCLUSION: ${{ github.event.workflow_run.conclusion }}
        run: |
          if [ "${CONCLUSION}" != "success" ]; then
            echo "Container Build and Publish workflow failed with: ${CONCLUSION}"
            exit 1
          fi
          echo "Container Build and Publish passed"
      - name: Skip (not triggered by this workflow)
        if: github.event_name != 'workflow_run'
        run: echo "Not a workflow_run event — pass (actual work done by Container Build and Publish workflow)"

  # ---------------------------------------------------------------------------
  # Independent jobs: run directly on push/pull_request
  # These are skipped when triggered by workflow_run (they don't depend on
  # any upstream workflow result).
  # ---------------------------------------------------------------------------

  forbid-suppressions:
    name: forbid-suppressions
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_run'
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: "Reject silent-failure workaround in shell/YAML/Dockerfile/justfile/HCL"
        run: |
          set -euo pipefail
          mapfile -t files < <(git ls-files \
            -- \
            '*.sh' '*.bash' '*.yml' '*.yaml' '*.hcl' \
            'Dockerfile*' '**/Dockerfile*' \
            'justfile' '**/justfile' 'Justfile' '**/Justfile')
          declare -a scan_files=()
          for f in "${files[@]}"; do
            case "$f" in
              # Exempt this workflow file (heredoc would otherwise self-match)
              .github/workflows/_required.yml) continue ;;
              # Exempt any runbook that documents the rule (if present)
              docs/runbooks/no-silent-failures.md) continue ;;
            esac
            scan_files+=("$f")
          done
          if [ "${#scan_files[@]}" -eq 0 ]; then
            echo "No files to scan"
            exit 0
          fi
          if grep -nE '\|\|[[:space:]]*true([[:space:]]*$|[[:space:]]+#)' "${scan_files[@]}"; then
            echo ""
            echo '::error::Found silent-failure workarounds above. Refactor per HomericIntelligence/Odysseus#280.'
            exit 1
          fi
          echo 'OK: no silent-failure workarounds found'

      - name: "Reject continue-on-error workflow opt-out"
        run: |
          set -euo pipefail
          mapfile -t files < <(git ls-files -- '.github/workflows/*.yml' '.github/workflows/*.yaml')
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No workflow files"
            exit 0
          fi
          if grep -nE '^[[:space:]]*continue-on-error:[[:space:]]*true[[:space:]]*$' "${files[@]}"; then
            echo ""
            echo '::error::Found "continue-on-error: true" above. Fix the root cause per HomericIntelligence/Odysseus#280.'
            exit 1
          fi
          echo 'OK: no "continue-on-error: true" found'

  security-dependency-scan:
    name: security/dependency-scan
    runs-on: ubuntu-24.04
    if: github.event_name != 'workflow_run'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          exit-code: '1'
          ignore-unfixed: true
          severity: CRITICAL,HIGH
      # Note: Conan's `audit` subcommand requires authentication against
      # audit.conan.io and is run as a separate, opt-in step locally (see
      # docs). Trivy (above) already scans `conan.lock` for CVEs against its
      # offline DB, providing CI-time coverage without external credentials.

  security-secrets-scan:
    name: security/secrets-scan
    runs-on: ubuntu-24.04
    if: github.event_name != 'workflow_run'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
      - name: Detect secrets
        env:
          GITLEAKS_VERSION: "8.21.2"
          # SHA-256 of gitleaks_8.21.2_linux_x64.tar.gz from
          # https://github.com/gitleaks/gitleaks/releases/tag/v8.21.2 — bumped in
          # lockstep with GITLEAKS_VERSION so a hijacked download is rejected.
          GITLEAKS_SHA256: "5bc41815076e6ed6ef8fbecc9d9b75bcae31f39029ceb55da08086315316e3ba"
        run: |
          set -euo pipefail
          # Extract gitleaks into a tmpdir outside the source tree so the
          # tarball's own README.md (which documents a sample sidekiq secret)
          # does not pollute the scan target.
          GITLEAKS_DIR="$(mktemp -d)"
          TARBALL="${GITLEAKS_DIR}/gitleaks.tar.gz"
          curl -sSfL --retry 3 \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -o "${TARBALL}"
          echo "${GITLEAKS_SHA256}  ${TARBALL}" | sha256sum --check --status
          tar xz -C "${GITLEAKS_DIR}" -f "${TARBALL}"
          # Scan full git history (fetch-depth: 0 above ensures it's available).
          # `--no-git` would only scan the working tree, missing secrets in
          # prior commits — see #68 follow-up to #9.
          "${GITLEAKS_DIR}/gitleaks" detect --source . --redact

  schema-validation:
    name: schema-validation
    runs-on: ubuntu-24.04
    if: github.event_name != 'workflow_run'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Install check-jsonschema
        run: pip3 install --user check-jsonschema
      - name: Validate workflow schemas
        run: |
          ~/.local/bin/check-jsonschema --builtin-schema vendor.github-workflows .github/workflows/*.yml
      - name: Validate composite action schemas
        # Composite action YAML files were previously unchecked; malformed
        # action.yml could fail downstream jobs. See #114.
        run: |
          shopt -s nullglob
          files=(.github/actions/**/action.yml .github/actions/**/action.yaml)
          if [ ${#files[@]} -gt 0 ]; then
            ~/.local/bin/check-jsonschema --builtin-schema vendor.github-actions "${files[@]}"
          else
            echo "No composite actions to validate."
          fi
      - name: Lint CHANGELOG.md (markdownlint)
        # Explicit CI coverage so CHANGELOG format drift is caught even if
        # contributors skip pre-commit hooks. Uses the same config as the
        # pre-commit hook (.markdownlint.yaml). See #161.
        run: |
          npm install --no-save --no-fund --no-audit markdownlint-cli@0.41.0
          npx markdownlint --config .markdownlint.yaml CHANGELOG.md

  deps-version-sync:
    name: deps/version-sync
    runs-on: ubuntu-24.04
    if: github.event_name != 'workflow_run'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Parse VERSION from CMakeLists.txt
        run: |
          VERSION=$(grep -A5 'project(' CMakeLists.txt \
            | grep -oP '\d+\.\d+\.\d+' | head -1)
          if [ -z "${VERSION}" ]; then
            echo "ERROR: Could not parse VERSION from CMakeLists.txt"
            exit 1
          fi
          echo "Detected project version: ${VERSION}"
          echo "PROJECT_VERSION=${VERSION}" >> "${GITHUB_ENV}"
      - name: Verify pixi.toml version matches (if present)
        run: |
          if [ -f pixi.toml ]; then
            PIXI_VERSION=$(grep -m1 '^version' pixi.toml \
              | grep -oP '\d+\.\d+\.\d+' | head -1)
            if [ -n "${PIXI_VERSION}" ] && [ "${PIXI_VERSION}" != "${PROJECT_VERSION}" ]; then
              echo "ERROR: pixi.toml version (${PIXI_VERSION}) does not match CMakeLists.txt (${PROJECT_VERSION})"
              exit 1
            fi
            echo "pixi.toml version ${PIXI_VERSION:-N/A} consistent with CMakeLists.txt ${PROJECT_VERSION}"
          else
            echo "No pixi.toml found, skipping cross-check"
          fi
      - name: Verify conanfile.py version matches (if present)
        run: |
          if [ -f conanfile.py ]; then
            CONAN_VERSION=$(grep -m1 '^\s*version\s*=' conanfile.py \
              | grep -oP '\d+\.\d+\.\d+' | head -1)
            if [ -n "${CONAN_VERSION}" ] && [ "${CONAN_VERSION}" != "${PROJECT_VERSION}" ]; then
              echo "ERROR: conanfile.py version (${CONAN_VERSION}) does not match CMakeLists.txt (${PROJECT_VERSION})"
              exit 1
            fi
            echo "conanfile.py version ${CONAN_VERSION:-N/A} consistent with CMakeLists.txt ${PROJECT_VERSION}"
          else
            echo "No conanfile.py found, skipping cross-check"
          fi

  typecheck:
    name: typecheck
    runs-on: ubuntu-24.04
    if: github.event_name != 'workflow_run'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build clang clang-tidy python3-pip
          pip3 install --user conan
      - name: Install Conan dependencies
        uses: ./.github/actions/conan-install
        with:
          build_type: debug
          compiler: clang
      - name: Configure with clang-tidy enabled
        run: CC=clang CXX=clang++ cmake --preset debug -DCharybdis_ENABLE_CLANG_TIDY=ON
      - name: Build (clang-tidy runs as part of build)
        run: cmake --build --preset debug

  lockfile-integrity:
    name: lockfile-integrity
    runs-on: ubuntu-24.04
    if: github.event_name != 'workflow_run'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Install Conan
        run: pip3 install --user conan
      - name: Configure Conan profile
        run: conan profile detect --force
      - name: Regenerate lockfile
        run: |
          conan lock create . \
            -s compiler=gcc \
            -s compiler.version=14 \
            -s compiler.libcxx=libstdc++11 \
            -s compiler.cppstd=20 \
            -s build_type=Debug \
            -s os=Linux \
            -s arch=x86_64
      - name: Verify lockfile is up-to-date
        run: |
          if ! git diff --exit-code conan.lock; then
            echo "ERROR: conan.lock is out of date. Run scripts/lock.sh locally and commit the result."
            exit 1
          fi
          echo "conan.lock is up-to-date"

  # Canonical `install` check for the Odysseus ecosystem board. Builds the
  # release artifact, runs `cmake --install` into a staging prefix, and smoke-
  # tests that the installed CLI executes. Exercises the install() rules in
  # CMakeLists.txt so packaging regressions are caught on every push/PR.
  install:
    name: install
    runs-on: ubuntu-24.04
    if: github.event_name != 'workflow_run'
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build python3-pip
          pip3 install --user conan
      - name: Install Conan dependencies
        uses: ./.github/actions/conan-install
        with:
          build_type: release
          compiler: gcc
      - name: Configure
        run: cmake --preset release
      - name: Build
        run: cmake --build --preset release
      - name: Install to staging prefix
        run: cmake --install build/release --prefix "${RUNNER_TEMP}/install-prefix"
      - name: Smoke-test installed CLI
        run: |
          set -euo pipefail
          BIN="${RUNNER_TEMP}/install-prefix/bin/Charybdis_cli"
          if [ ! -x "${BIN}" ]; then
            echo "ERROR: installed CLI not found or not executable at ${BIN}"
            # Diagnostic listing guarded by -d so a missing prefix dir cannot
            # abort the script before the explicit exit below (set -e active).
            if [ -d "${RUNNER_TEMP}/install-prefix" ]; then
              find "${RUNNER_TEMP}/install-prefix" -maxdepth 4 -print
            fi
            exit 1
          fi
          # Run the installed binary. Accept --help success (0) or a benign
          # usage exit; fail only on crash/segfault/missing-lib exits.
          # `|| rc=$?` captures the exit code without tripping set -e.
          rc=0
          "${BIN}" --help || rc=$?
          if [ "${rc}" -ge 2 ]; then
            echo "ERROR: installed CLI exited ${rc} (>=2 indicates crash/load failure)"
            exit "${rc}"
          fi
          echo "Installed CLI ran (exit ${rc})"

  # Canonical `release` check for the Odysseus ecosystem board. The real
  # publish pipeline lives in release.yml and is tag-gated (no check-run on
  # main). This DRY-RUN validates the release prerequisites on every push/PR —
  # version parses from CMakeLists.txt and the changelog generator runs — but
  # publishes NOTHING. See release.yml for the actual tag-driven release.
  release:
    name: release
    runs-on: ubuntu-24.04
    if: github.event_name != 'workflow_run'
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0
      - name: Validate canonical version parses from CMakeLists.txt
        run: |
          set -euo pipefail
          CMAKE_VERSION=$(grep -A5 'project(' CMakeLists.txt \
            | grep -oP '\d+\.\d+\.\d+' | head -1)
          if [ -z "${CMAKE_VERSION}" ]; then
            echo "ERROR: Could not parse VERSION from CMakeLists.txt"
            exit 1
          fi
          echo "Canonical version: ${CMAKE_VERSION}"
          echo "CMAKE_VERSION=${CMAKE_VERSION}" >> "${GITHUB_ENV}"
      - name: Dry-run changelog generation
        env:
          CMAKE_VERSION: ${{ env.CMAKE_VERSION }}
        run: |
          set -euo pipefail
          if [ ! -f scripts/generate-changelog.sh ]; then
            echo "ERROR: scripts/generate-changelog.sh missing — release pipeline broken"
            exit 1
          fi
          TAG_NAME="v${CMAKE_VERSION}"
          # The vX.Y.Z tag does not exist yet during a pre-release dry-run, so
          # diff the most recent existing tag against HEAD (not the unborn tag)
          # to validate the changelog generator end-to-end without a real tag.
          PREV_TAG=$(git tag --sort=-creatordate \
            | awk -v skip="${TAG_NAME}" '$0 != skip { print; exit }')
          if [ -z "${PREV_TAG}" ]; then
            PREV_TAG=$(git rev-list --max-parents=0 HEAD)
          fi
          echo "Generating changelog fragment ${PREV_TAG}..HEAD for ${TAG_NAME} (dry-run, no publish)"
          FRAGMENT=$(bash scripts/generate-changelog.sh "${PREV_TAG}" "HEAD")
          echo "----- changelog fragment (dry-run) -----"
          echo "${FRAGMENT}"
          echo "----------------------------------------"
          echo "Release dry-run OK — no artifacts published."
